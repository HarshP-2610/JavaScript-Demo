<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disney Characters</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-rose-50 p-6">

    <div class="max-w-7xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black text-rose-600 drop-shadow-sm">Disney Universe</h1>
            <p class="text-gray-600 mt-2 italic">Explore your favorite characters</p>
        </div>

        <div id="disneyContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <p class="text-center col-span-full animate-pulse text-rose-400">Summoning characters...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
