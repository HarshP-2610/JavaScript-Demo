<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Movie Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-slate-200 p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-12 border-l-8 border-indigo-600 pl-6">
            <h1 class="text-5xl font-black uppercase tracking-tighter">Anime <span
                    class="text-indigo-500">Theater</span></h1>
            <p class="text-slate-400 mt-2">Discover top-rated animated feature films</p>
        </header>

        <div id="animeGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <div class="col-span-full text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-indigo-500 mb-4"></div>
                <p class="text-slate-500">Loading catalog...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
