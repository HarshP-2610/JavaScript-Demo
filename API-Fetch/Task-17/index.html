<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free-To-Play Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-4xl font-black text-cyan-400 tracking-widest uppercase">Game Vault</h1>
                <p class="text-slate-400">Top Free-to-Play Titles</p>
            </div>
            <div class="bg-slate-900 px-4 py-2 rounded-lg border border-slate-800">
                <span id="gameCount" class="text-cyan-400 font-bold">0</span> Games Found
            </div>
        </header>

        <div id="gameGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <p class="col-span-full text-center text-slate-500 animate-pulse">Loading game library...</p>
        </div>
    </div>

    <script src="games.js"></script>
</body>

</html>
