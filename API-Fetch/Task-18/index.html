<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .img-gradient {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, transparent 40%);
        }
    </style>
</head>

<body class="bg-white p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-end mb-12 border-b-2 border-gray-100 pb-6">
            <div>
                <h1 class="text-5xl font-light text-gray-900 tracking-tight">LUMINA <span
                        class="font-bold">GALLERY</span></h1>
                <p class="text-gray-400 mt-2">Curated photography from around the globe</p>
            </div>
            <button onclick="fetchGallery()"
                class="mt-4 bg-black text-white px-6 py-2 rounded-full hover:bg-gray-800 transition shadow-lg">
                Refresh Gallery
            </button>
        </div>

        <div id="galleryGrid" class="columns-1 sm:columns-2 lg:columns-3 xl:columns-4 gap-4 space-y-4">
        </div>
    </div>

    <script src="gallery.js"></script>
</body>

</html>
