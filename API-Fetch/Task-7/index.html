<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Random Joke Generator</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white shadow-xl rounded-xl p-8 max-w-md text-center">

        <h1 class="text-2xl font-bold text-gray-800 mb-6">
            😂 Random Joke Generator
        </h1>

        <p id="jokeText" class="text-gray-600 mb-6">
            Loading joke...
        </p>

        <button onclick="getJoke()"
            class="bg-indigo-500 text-white px-6 py-2 rounded-lg hover:bg-indigo-600 transition">
            Get New Joke
        </button>

    </div>

    <script src="joke.js"></script>

</body>

</html>
