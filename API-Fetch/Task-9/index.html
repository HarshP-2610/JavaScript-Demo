<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Random Dog Generator</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white shadow-xl rounded-xl p-8 text-center w-[400px]">

        <h1 class="text-2xl font-bold text-indigo-600 mb-4">
            🐶 Random Dog Generator
        </h1>

        <img id="dogImage" src="" class="w-full h-64 object-cover rounded-lg mb-4" />

        <button onclick="getDog()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">
            Generate Dog
        </button>

    </div>

    <script src="dog.js"></script>

</body>

</html>
