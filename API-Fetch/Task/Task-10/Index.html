<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather App</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen">

    <div class="bg-white shadow-xl rounded-xl p-8 w-[400px] text-center">

        <h1 class="text-2xl font-bold text-blue-600 mb-5">
            🌦 Weather App
        </h1>

        <input type="text" id="city" placeholder="Enter City Name" class="border p-2 rounded w-full mb-4" />

        <button onclick="getWeather()" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
            Get Weather
        </button>

        <div id="weatherResult" class="mt-6 text-gray-700"></div>

    </div>

    <script src="weather.js"></script>

</body>

</html>
